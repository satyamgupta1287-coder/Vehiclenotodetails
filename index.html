<!DOCTYPE html>
<html>
<head>
<title>Vehicle Trace</title>

<style>
body{
  background:linear-gradient(135deg,#000,#001a14);
  color:#00ffc3;
  font-family:monospace;
  text-align:center;
}

.box{margin-top:80px;}

.plate{
  background:#111;
  border:1px solid #00ffc3;
  width:220px;
  margin:20px auto;
  padding:12px;
  font-size:20px;
  border-radius:10px;
  box-shadow:0 0 20px #00ffc3;
}

input{
  padding:12px;
  width:240px;
  background:#000;
  border:1px solid #00ffc3;
  color:#00ffc3;
  border-radius:8px;
}

button{
  margin-top:15px;
  padding:12px 25px;
  background:#00ffc3;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.contact{margin-top:30px;}

.contact a{
  display:block;
  margin:8px;
  color:#00ff00;
  text-decoration:none;
}

.contact img{
  vertical-align:middle;
  margin-right:6px;
}

.dev{
  position:fixed;
  bottom:10px;
  width:100%;
}

.disclaimer{
  font-size:12px;
  margin-top:20px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="box">

<h2>⚡ VEHICLE TRACE SYSTEM ⚡</h2>

<div class="plate" id="plate">HR00XX0000</div>

<input id="vehicle" placeholder="ENTER VEHICLE NUMBER" oninput="updatePlate()">

<br>
<button onclick="go()">SCAN</button>

<div class="contact">
📱 Contact Me  

<a href="https://www.instagram.com/satyam_________gupta?igsh=MTJhNTIwZGQ4anF2Zg==" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="20"> Instagram
</a>

<a href="https://t.me/satyamgupta9999" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="20"> Telegram
</a>

</div>

<div class="disclaimer">⚠ Educational use only</div>

</div>

<div class="dev">⚡ Developed by Satyam Gupta ⚡</div>

<audio id="typeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-keyboard-typing-1386.mp3"></audio>
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>
function updatePlate(){
  let val=document.getElementById("vehicle").value.toUpperCase();
  document.getElementById("plate").innerText=val||"HR00XX0000";

  let s=document.getElementById("typeSound");
  s.currentTime=0;
  s.play().catch(()=>{});
}

function go(){
  let v=document.getElementById("vehicle").value;
  if(!v) return alert("Enter vehicle number");

  document.getElementById("clickSound").play().catch(()=>{});

  setTimeout(()=>{
    window.location.href="loading.html?vehicle="+v;
  },200);
}
</script>

</body>
</html>
