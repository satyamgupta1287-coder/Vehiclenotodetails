<!DOCTYPE html>
<html>
<head>
<title>Scanning</title>

<style>
body{
  background:#000;
  color:#00ff9f;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

.title{
  margin-top:60px;
  font-size:22px;
  animation:flicker 1.5s infinite;
}

@keyframes flicker{
  50%{opacity:0.6;}
}

.scanline{
  position:absolute;
  width:100%;
  height:2px;
  background:#00ff9f;
  top:0;
  animation:scan 3s linear infinite;
}

@keyframes scan{
  0%{top:0;}
  100%{top:100%;}
}

.log{
  width:80%;
  margin:30px auto;
  padding:15px;
  border:1px solid #00ff9f;
  box-shadow:0 0 15px #00ff9f;
  text-align:left;
  height:180px;
  overflow:hidden;
}

.bar{
  width:80%;
  height:10px;
  margin:20px auto;
  background:#111;
}

.fill{
  height:100%;
  width:0%;
  background:#00ff9f;
  box-shadow:0 0 15px #00ff9f;
}

.dev{
  position:fixed;
  bottom:10px;
  width:100%;
}

.disclaimer{
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="scanline"></div>

<div class="title">⚡ SYSTEM SCAN INITIATED ⚡</div>

<div class="log" id="log"></div>

<div class="bar"><div class="fill" id="fill"></div></div>

<div id="percent">0%</div>

<div class="disclaimer">⚠ Educational use only</div>
<div class="dev">⚡ Developed by Satyam Gupta ⚡</div>

<audio id="scanSound" src="https://assets.mixkit.co/sfx/preview/mixkit-interface-option-select-2573.mp3" loop></audio>

<script>
let v=new URLSearchParams(window.location.search).get("vehicle");

let log=document.getElementById("log");
let fill=document.getElementById("fill");
let percent=document.getElementById("percent");

let sound=document.getElementById("scanSound");
sound.volume=0.3;
sound.play().catch(()=>{});

let lines=[
"> Initializing...",
"> Connecting server...",
"> Verifying number...",
"> Fetching data...",
"> AI processing...",
"> Finalizing..."
];

let i=0;
setInterval(()=>{
  if(i<lines.length){
    let d=document.createElement("div");
    d.innerText=lines[i];
    log.appendChild(d);
    log.scrollTop=log.scrollHeight;
    i++;
  }
},700);

let p=0;
let load=setInterval(()=>{
  p+=4;
  fill.style.width=p+"%";
  percent.innerText=p+"%";

  if(p>=100){
    clearInterval(load);
    sound.pause();
    setTimeout(()=>{
      window.location.href="result.html?vehicle="+v;
    },800);
  }
},120);
</script>

</body>
</html>
